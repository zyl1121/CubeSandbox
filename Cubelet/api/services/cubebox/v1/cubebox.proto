syntax = "proto3";

package cubelet.services.cubebox.v1;
import "api/services/errorcode/v1/errorcode.proto";
import "api/services/images/v1/images.proto";

option go_package = "github.com/tencentcloud/CubeSandbox/Cubelet/api/services/cubebox/v1;cubebox";


// Service for handling cubesandbox
service CubeboxMgr {
  rpc Create(RunCubeSandboxRequest) returns (RunCubeSandboxResponse);
  rpc Destroy(DestroyCubeSandboxRequest) returns (DestroyCubeSandboxResponse);
  rpc List(ListCubeSandboxRequest) returns (ListCubeSandboxResponse);
  rpc Update(UpdateCubeSandboxRequest) returns (UpdateCubeSandboxResponse);
  rpc Exec(ExecCubeSandboxRequest) returns (ExecCubeSandboxResponse);
  // AppSnapshot creates a cubebox, makes an app snapshot, and destroys the cubebox.
  // Required annotations:
  //   - cube.master.appsnapshot.create: "true"
  //   - cube.master.appsnapshot.template.id: "<template_id>"
  rpc AppSnapshot(AppSnapshotRequest) returns (AppSnapshotResponse);
  // CommitSandbox snapshots an existing running sandbox into a template snapshot.
  rpc CommitSandbox(CommitSandboxRequest) returns (CommitSandboxResponse);
  // RollbackSandbox restores a running sandbox to a committed snapshot.
  rpc RollbackSandbox(RollbackSandboxRequest) returns (RollbackSandboxResponse);
  // CleanupTemplate removes local template snapshot/base data from this node.
  rpc CleanupTemplate(CleanupTemplateRequest) returns (CleanupTemplateResponse);
  // ListSandboxSnapshots inspects the requested snapshot objects on this node.
  rpc ListSandboxSnapshots(ListSandboxSnapshotsRequest) returns (ListSandboxSnapshotsResponse);
  // ListLocalSnapshots returns the full catalog of snapshots known to this node.
  // It is intended for master discovery / inspection so master does not need to
  // persist physical references (vol/dev/path/meta_dir) in its tables.
  rpc ListLocalSnapshots(ListLocalSnapshotsRequest) returns (ListLocalSnapshotsResponse);
  // GetLocalSnapshot returns the physical catalog entry for a single snapshot
  // by snapshot id. Returns PreConditionFailed when no local record exists.
  rpc GetLocalSnapshot(GetLocalSnapshotRequest) returns (GetLocalSnapshotResponse);
  // ExportTemplateRootfsArtifact streams the committed rootfs ext4 bytes for a
  // locally committed template so master can register and distribute it as a
  // normal RootfsArtifact.
  rpc ExportTemplateRootfsArtifact(ExportTemplateRootfsArtifactRequest) returns (stream ExportTemplateRootfsArtifactChunk);
  // GetStorageMetrics returns node-local cubecow storage metrics.
  rpc GetStorageMetrics(GetStorageMetricsRequest) returns (GetStorageMetricsResponse);
  // InspectStorageVolumes lists every sandbox storage record cubelet owns and
  // re-resolves cubecow device paths so cubecli can render an authoritative
  // view without touching boltdb or the cubecow SDK directly.
  rpc InspectStorageVolumes(InspectStorageVolumesRequest) returns (InspectStorageVolumesResponse);
  // CleanupOrphanStorageFiles scans configured emptydir format roots, drops
  // files that have no live sandbox owner, and reports the action taken.
  rpc CleanupOrphanStorageFiles(CleanupOrphanStorageFilesRequest) returns (CleanupOrphanStorageFilesResponse);
}

// SELinuxOption are the labels to be applied to the container.
message SELinuxOption {
  string user = 1;
  string role = 2;
  string type = 3;
  string level = 4;
}

// Capability contains the container capabilities to add or drop
message Capability {
  // List of capabilities to add.
  repeated string add_capabilities = 1;
  // List of capabilities to drop.
  repeated string drop_capabilities = 2;
  // List of ambient capabilities to add.
  repeated string add_ambient_capabilities = 3;
}

// Int64Value is the wrapper of int64.
message Int64Value {
  // The value.
  int64 value = 1;
}

// ContainerSecurityContext holds linux security configuration that will be applied to a container.
message ContainerSecurityContext {
  // Capabilities to add or drop.
  Capability capabilities = 1;

  // If set, run container in privileged mode.
  // Privileged mode is incompatible with the following options. If
  // privileged is set, the following features MAY have no effect:
  // 1. capabilities
  // 2. selinux_options
  // 4. seccomp
  // 5. apparmor
  //
  // Privileged mode implies the following specific options are applied:
  // 1. All capabilities are added.
  // 2. Sensitive paths, such as kernel module paths within sysfs, are not masked.
  // 3. Any sysfs and procfs mounts are mounted RW.
  // 4. AppArmor confinement is not applied.
  // 5. Seccomp restrictions are not applied.
  // 6. The device cgroup does not restrict access to any devices.
  // 7. All devices from the host's /dev are available within the container.
  // 8. SELinux restrictions are not applied (e.g. label=disabled).
  bool privileged = 2;
  // UID to run the container process as. Only one of run_as_user and
  // run_as_username can be specified at a time.
  Int64Value run_as_user = 5;
  // no_new_privs defines if the flag for no_new_privs should be set on the
  // container.
  bool no_new_privs = 11;
  // GID to run the container process as. run_as_group should only be specified
  // when run_as_user or run_as_username is specified; otherwise, the runtime
  // MUST error.
  Int64Value run_as_group = 12;
  // User name to run the container process as. If specified, the user MUST
  // exist in the container image (i.e. in the /etc/passwd inside the image),
  // and be resolved there by the runtime; otherwise, the runtime MUST error.
  string run_as_username = 6;
  // If set, the root filesystem of the container is read-only.
  // when not set,RunCubeSandboxRequest.volumes should provide one empty_dir source for the rootfs rw
  // and Container.VolumeMounts provide container_path="/" format
  bool readonly_rootfs = 7;
}

// DNSConfig specifies the DNS servers and search domains of a sandbox.
message DNSConfig {
  // List of DNS servers of the cluster.
  repeated string servers = 1;
  // List of DNS search domains of the cluster.
  repeated string searches = 2;
  // List of DNS options. See https://linux.die.net/man/5/resolv.conf
  // for all available options.
  repeated string options = 3;
}

// Rlimits specifies rlimit options to apply to the process.
message RLimit {
  // the RLIMIT_NOFILE value to set
  uint64 no_file = 1;
}

// MountPropagation determines how mounts are propagated from the host
// to container and the other way around.
// When not set, MountPropagationNone is used.
enum MountPropagation {
  // No mount propagation ("private" in Linux terminology).
  PROPAGATION_PRIVATE = 0;
  // Mounts get propagated from the host to the container ("rslave" in Linux).
  PROPAGATION_HOST_TO_CONTAINER = 1;
  // Mounts get propagated from the host to the container and from the
  // container to the host ("rshared" in Linux).
  PROPAGATION_BIDIRECTIONAL = 2;
}

// VolumeMount describes a mounting of a Volume within a container.
message VolumeMounts {
  // Required: This must be a DNS_LABEL.  Each volume in a Sandbox must have
  // a unique name.
  string name = 1;
  // Path of the mount within the container.
  string container_path = 2;
  // If set, the mount is read-only.
  bool readonly = 3;
  // Requested propagation mode.
  MountPropagation propagation = 4;
  // UID for tmpfs mount (only applies to tmpfs volumes)
  string uid = 5;
  // GID for tmpfs mount (only applies to tmpfs volumes)
  string gid = 6;
  // If set to true, allow execution on tmpfs mount (only applies to tmpfs volumes)
  bool exec = 7;
  // Path of the mount on the host. If the hostPath doesn't exist, then runtimes
  // should report error. If the hostpath is a symbolic link, runtimes should
  // follow the symlink and mount the real destination to container.
  string host_path = 8;
  // Requested propagation mode.
  // UidMappings specifies the runtime UID mappings for the mount.
  repeated IDMapping uidMappings = 9;
  // GidMappings specifies the runtime GID mappings for the mount.
  repeated IDMapping gidMappings = 10;
  // If set to true, the mount is made recursive read-only.
  // In this CRI API, recursive_read_only is a plain true/false boolean, although its equivalent
  // in the Kubernetes core API is a quaternary that can be nil, "Enabled", "IfPossible", or "Disabled".
  // kubelet translates that quaternary value in the core API into a boolean in this CRI API.
  // Remarks:
  // - nil is just treated as false
  // - when set to true, readonly must be explicitly set to true, and propagation must be PRIVATE (0).
  // - (readonly == false && recursive_read_only == false) does not make the mount read-only.
  bool recursive_read_only = 11;

  // If set, the mount is read-only.
  bool selinux_relabel = 12;

  // Specific image sub path to be used from inside the image instead of its
  // root, only necessary if the above image field is set. If the sub path is
  // not empty and does not exist in the image, then runtimes should fail and
  // return an error.
  // Introduced in the Image Volume Source KEP beta graduation: https://kep.k8s.io/4639
  string sub_path = 13;
}

// TCPSocketAction describes an action based on opening a socket.
message TCPSocketAction {
  int32  port = 1;
  string host =2;
}

// TCPSocketAction describes an action based on ping.
message PingAction {
  bool udp = 1;
}

// HTTPGetAction describes an action based on HTTP Get requests.
message HTTPGetAction {
  // Path to access on the HTTP server.
  optional string path = 1;

  // The port to access on the container.
  // Number must be in the range 1 to 65535.
  int32 port = 2;

  // Host name to connect to, defaults to the sandbox IP. You probably want to set
  // "Host" in httpHeaders instead.
  optional string host = 3;

  // Custom headers to set in the request. HTTP allows repeated headers.
  // +optional
  repeated HTTPHeader http_headers = 5;
}

// HTTPHeader describes a custom header to be used in HTTP probes
message HTTPHeader {
  // The header field name.
  // This will be canonicalized upon output, so case-variant names will be understood as the same header.
  optional string name = 1;

  // The header field value
  optional string value = 2;
}

// ProbeHandler defines a specific action that should be taken in a probe.
// One and only one of the fields must be specified.
message ProbeHandler {
  // TCPSocket specifies an action involving a TCP port.
  // +optional
  TCPSocketAction tcp_socket = 1;
  // Ping specifies the ping request to perform.
  // +optional
  PingAction      ping = 2;
  // HTTPGet specifies the http request to perform.
  // +optional
  HTTPGetAction   http_get = 3;
}
// Probe describes a health check to be performed against a container to determine whether it is
// alive or ready to receive traffic.
message Probe {
  // The action taken to determine the health of a container
  ProbeHandler probe_handler = 1;
  // Length of time before health checking is activated.  In Millisecond.
  // +optional
  int32 initial_delay_ms = 2;
  // Length of time before health checking times out.  In Millisecond.
  // +optional
  int32 timeout_ms = 3;
  // How often (in Millisecond) to perform the probe.
  // +optional
  int32 period_ms = 4;
  // Minimum consecutive successes for the probe to be considered successful after having failed.
  // Must be 1 for liveness and startup.
  int32 success_threshold = 5;
  // Minimum consecutive failures for the probe to be considered failed after having succeeded.
  // +optional
  int32 failure_threshold = 6;
  // 单次探测超时时间(毫秒），默认100
  // +optional
  int32 probe_timeout_ms = 7;
}

// LifecycleHandler defines a specific action that should be taken in a lifecycle hook. One and only one of the fields, except TCPSocket must be specified
message LifecycleHandler {
  HTTPGetAction   http_get = 1;
}

// PreStop This hook is called immediately before a container is terminated due to an API request or management event such as a liveness/startup probe failure, preemption,
// resource contention and others.
message PreStop {
  // Length of time before container is killed.  In Millisecond.
  int32 termination_grace_period_ms = 1;
  // The action taken to execute the prestop hook
  // The action taken to determine the health of a container
  LifecycleHandler lifecyle_handler = 2;
}

message PostStop {
  // Length of request timeout.  In Millisecond.
  int32 timeout_ms = 1;
  // How often (in Millisecond) to perform the probe.
  // The action taken to execute the afterstop hook
  // The action taken to determine the health of a container
  LifecycleHandler lifecyle_handler = 2;
}

message Hook {
  string path = 1;
  repeated string args = 2;
  repeated string env = 3;
  optional int32 timeout = 4;
}

message Hooks {
  repeated Hook Prestart = 1;
}

message KeyValue {
  string key = 1;
  string value = 2;
}

// HostAlias holds the mapping between IP and hostnames that will be injected as an entry in the
// sandbox's hosts file.
message HostAlias {
  // Hostnames for the above IP address.
  repeated string hostnames = 1;
  // IP address of the host file entry.
  string ip = 2;
}

message ContainerConfig {
  // Name of the container
  string name = 1;
  // Image to use.
  cubelet.services.images.v1.ImageSpec image = 2;
  // Command to execute (i.e., entrypoint for docker)
  repeated string command = 3;
  // Args for the Command (i.e., command for docker)
  repeated string args = 4;
  // Current working directory of the command.
  string working_dir = 5;
  // List of environment variable to set in the container.
  repeated KeyValue envs = 6;
  // Mounts for the container.
  repeated VolumeMounts volume_mounts = 7;
  // r_limit for container
  RLimit r_limit = 8;
  // Resources specification for the container.
  Resource resources = 9;
  // security_context configuration for the container.
  ContainerSecurityContext security_context = 10;
  // probe
  Probe probe = 11;
  // sysctls holds linux sysctls config for the container.
  map<string, string> sysctls =12;
  // syscalls holds linux syscall config for the container.
  repeated  SysCall syscalls = 13;
  // DNS config for the container.
  DNSConfig dns_config = 14;
  // annotations
  map<string, string> annotations = 15;

  // HostAliases is an optional list of hosts and IPs that will be injected into the sandbox's hosts
  // file if specified.
  repeated HostAlias hostAliases = 16;

  // PreStop
  PreStop prestop = 17;

  // PostStop
  PostStop poststop = 18;
  
  // container name use by cubebox
  string id = 19;

  // Hooks for the container.
  Hooks hooks = 20;
  // CDI
  OCIConfig oci_config = 21;
}

message OCIConfig {
  // Devices for the container.
  repeated Device devices = 1;

  // CDI devices for the container.
  repeated CDIDevice cdi_devices = 2;
}

// Device specifies a host device to mount into a container.
message Device {
  // Path of the device within the container.
  string container_path = 1;
  // Path of the device on the host.
  string host_path = 2;
  // Cgroups permissions of the device, candidates are one or more of
  // * r - allows container to read from the specified device.
  // * w - allows container to write to the specified device.
  // * m - allows container to create device files that do not yet exist.
  string permissions = 3;
}

// CDIDevice specifies a CDI device information.
message CDIDevice {
  // Fully qualified CDI device name
  // for example: vendor.com/gpu=gpudevice1
  // see more details in the CDI specification:
  // https://github.com/container-orchestrated-devices/container-device-interface/blob/main/SPEC.md
  string name = 1;
}

message  LinuxSeccompArg {
  uint32 index = 1;
  uint64 value = 2;
  uint64 valueTwo = 3;
  // op ref:LinuxSeccompOperator
  string op = 4;
}

message SysCall {
  repeated string names = 1;
  // action ref:LinuxSeccompAction
  string action = 2;
  uint32 errno = 3;
  // args ref:LinuxSeccompArg
  repeated LinuxSeccompArg args = 4;
}

// Resource
// ref by https://kubernetes.io/zh-cn/docs/reference/kubernetes-api/common-definitions/quantity/#Quantity
message Resource{
  //Cpu的限制，单位为core数
  string cpu = 1;
  //内存限制，单位可以为字节
  string mem = 2;

  // mvm内对容器的cpu限制，单位为core数
  string cpu_limit = 3;
  // mvm内对容器的内存限制，单位可以为字节
  string mem_limit = 4;
}




enum StorageMedium {
  //use blk device the default is for the node
  StorageMediumDefault = 0;
  //use memory (e.g. tmpfs on linux)
  StorageMediumMemory  = 1;
  //use cubemsg
  StorageMediumCubeMsg  = 2;
}

// EmptyDirVolumeSource represents an empty directory for a sandbox.
message  EmptyDirVolumeSource {
  // media more like a scheduling problem - user says what traits they
  // need, we give them a backing store that satisfies that.  For now
  // this will cover the most common needs.
  // Optional: what type of storage medium should back this directory.
  // The default is "" which means to use the node's default medium.
  // +optional
  StorageMedium Medium = 1;
  // Total amount of local storage required for this EmptyDir volume.
  // The size limit is also applicable for memory medium.
  // The maximum usage on memory medium EmptyDir would be the minimum value between
  // the SizeLimit specified here and the sum of memory limits of all containers in a Sandbox.
  // The default is nil which means that the limit is undefined.
  // More info: http://kubernetes.io/docs/user-guide/volumes#emptydir
  // default 512Mi
  string SizeLimit = 2;
}

// Represents a sandbox path mapped into a container.
message SandboxPathVolumeSource {
  // path of the directory on the sandbox vm.
  string path = 1;
  // type for SandboxPath Volume
  string type = 2;
}

enum SandboxPathType {
  // A directory must exist at the given path
  Directory = 0;
  // A cgroup mount must exist at the given path
  Cgroup = 1;
  SharedBindMount = 2;
}

// HostDirSource defines a single host directory to be shared into the VM/container
// via a virtiofs propagation channel.
message HostDirSource {
  // Unique name for this source, referenced by VolumeMount.name.
  string name = 1;
  // Absolute path of the directory on the host to share.
  string host_path = 2;
}

// HostDirVolumeSources contains a list of host directory volumes to share into
// containers via virtiofs propagation channels (virtio_ro / virtio_rw).
message HostDirVolumeSources {
  // List of host directory sources.
  repeated HostDirSource volume_sources = 1;
}

// VolumeSource represents the source location of a volume to mount.
// Only one of its members may be specified.
message  VolumeSource {
  EmptyDirVolumeSource empty_dir = 1;
  SandboxPathVolumeSource sandbox_path = 5;
  // host_dir_volumes shares host directories into the container via virtiofs.
  HostDirVolumeSources host_dir_volumes = 7;
  // image volume source for image volume mount
  cubelet.services.images.v1.ImageVolumeSource image = 9;
}

// Volume represents a named volume in a pod that may be accessed by any container in the pod.
message  Volume {
  // Required: This must be a DNS_LABEL.  Each volume in a Sandbox must have
  // a unique name.
  // 这里必须包含用户资源的唯一标识,比如：tenant+funcid
  string name = 1;
  // The VolumeSource represents the location and type of a volume to mount.
  VolumeSource volume_source =2;
}

message RunCubeSandboxRequest {
  // request_ID reqID
  string requestID     = 1;
  // volumes
  repeated Volume volumes = 7;
  // containers Sandbox.Spec.Containers
  repeated ContainerConfig containers = 8;
  // Annotations can also be useful for runtime authors to experiment with
  // new features that are opaque to the Kubernetes APIs (both user-facing
  // and the CRI). Whenever possible, however, runtime authors SHOULD
  // consider proposing new typed fields for any new features instead.
  map<string, string> annotations = 9;

  // Key-value pairs that may be used to scope and select individual resources.
  map<string, string> labels = 10;

  // expose ports for external access
  repeated int64 exposed_ports = 11;

  // Named runtime configuration to use for this PodSandbox.
  // If the runtime handler is unknown, this request should be rejected.  An
  // empty string should select the default handler, equivalent to the
  // behavior before this feature was added.
  // See https://git.k8s.io/enhancements/keps/sig-node/585-runtime-class
  string runtime_handler = 12;

  // There are some specific instance types for different scenarios.
  // Each type has its own special logic during its lifecycle.
  string instance_type = 13;

  // NetworkType default to tap
  string network_type = 14;

  // user define namespace
  string namespace = 15;

  // CubeVS egress policy for the sandbox template/runtime.
  optional CubeVSContext cubevs_context = 16;
}

message RunCubeSandboxResponse {
  // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
  // ID of the Sandbox.
  string sandboxID = 3;
  // UUID of the Sandbox(mvm uuid).
  string sandboxUUID = 4;
  // ip of the Sandbox(mvm ip).
  string sandboxIP = 5;
  map<string, bytes> ext_info = 6;
  repeated PortMapping port_mappings = 7;
}

enum InstanceType {
  cubebox = 0;
}

enum NetworkType {
  tap = 0;
}

message PortMapping {
  // Port exposed in the container.
  int32 container_port = 1;
  // Port exposed on the host.
  int32 host_port = 2;
}

message CubeVSContext {
  optional bool allow_internet_access = 1;
  repeated string allow_out = 2;
  repeated string deny_out = 3;
}

message DestroyCubeSandboxRequest {
  // requestID reqID
  string requestID     = 1;
  // ID of the Sandbox.
  string sandboxID = 2;
  // Annotations can also be useful for runtime authors to experiment with
  // new features that are opaque to the Kubernetes APIs (both user-facing
  // and the CRI). Whenever possible, however, runtime authors SHOULD
  // consider proposing new typed fields for any new features instead.
  map<string, string> annotations = 9;
  // filter provide a strong assumption for destroy
  // if not match, do nothing
  CubeSandboxFilter filter = 10;
}

message DestroyCubeSandboxResponse {
  // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
  // ID of the Sandbox.
  string sandboxID = 3;
  map<string, bytes> ext_info = 4;
}

message CubeSandbox {
  // ID of the CubeSandbox.
  string id = 1;
  // containerd namespace.
  string namespace = 2;
  // Creation time of the sandbox.
  int64 created_at = 3;
  // containers Sandbox.Spec.Containers
  repeated Container containers = 4;
  // Local cubevs portmapping
  repeated PortMapping port_mappings = 5;
  map<string, string> labels = 6;
  int32 numa_node = 7;
  int64 paused_at = 8;
  // cubebox_storage_data is the private data of the cubebox store.
  // It is used to store the data of the cubebox store.
  // this field only used with with_cubebox_store option for cubecli command.
  bytes private_cubebox_storage_data = 9;
}

message Container {
  // ID of the container, used by the container runtime to identify
  // a container.
  string id = 1;
  // Spec of the image.
  string image = 2;
  // Type is container type. Sandbox or Container.
  string type = 3;
  // Resources specification for the container.
  Resource resources = 4;
  // State of the container.
  ContainerState state = 5;
  // Creation time of the container in nanoseconds.
  int64 created_at = 6;
  // exit time of the container in nanoseconds.
  int64 finished_at = 7;
  map<string, string> labels = 8;
  int64 paused_at = 9;
}

// ContainerState represents the lifecycle state of a container.
enum ContainerState {
  CONTAINER_CREATED = 0;
  CONTAINER_RUNNING = 1;
  CONTAINER_EXITED  = 2;
  CONTAINER_UNKNOWN = 3;
  CONTAINER_PAUSING  = 4;
  CONTAINER_PAUSED  = 5;
}

// ContainerStateValue is the wrapper of ContainerState.
message ContainerStateValue {
  // State of the container.
  ContainerState state = 1;
}

// PodSandboxFilter is used to filter a list of PodSandboxes.
// All those fields are combined with 'AND'
message CubeSandboxFilter {
  // State of the sandbox.
  ContainerStateValue state = 1;
  // LabelSelector to select matches.
  // Only api.MatchLabels is supported for now and the requirements
  // are ANDed. MatchExpressions is not supported yet.
  map<string, string> label_selector = 2;

  // There are some specific instance types for different scenarios.
  // Each type has its own special logic during its lifecycle.
  string instance_type = 3;
}

message ListCubeSandboxRequest {
  // ID of the sandbox.
  optional string id = 1;
  // CubeSandboxFilter to filter a list of CubeSandboxes.
  optional CubeSandboxFilter filter = 2;
  optional ListCubeSandboxOption option = 3;
}

message ListCubeSandboxResponse {
  // List of CubeSandboxes.
  repeated CubeSandbox items = 1;
}

message UpdateCubeSandboxRequest {
  // requestID reqID
  string requestID     = 1;
  // ID of the Sandbox.
  string sandboxID = 2;
  // Annotations can also be useful for runtime authors to experiment with
  // new features that are opaque to the Kubernetes APIs (both user-facing
  // and the CRI). Whenever possible, however, runtime authors SHOULD
  // consider proposing new typed fields for any new features instead.
  map<string, string> annotations = 3;
}

message UpdateCubeSandboxResponse {
  // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
}

// IDMapping describes host to container ID mappings for a pod sandbox.
message IDMapping {
  // HostId is the id on the host.
  uint32 host_id = 1;
  // ContainerId is the id in the container.
  uint32 container_id = 2;
  // Length is the size of the range to map.
  uint32 length = 3;
}

message ListCubeSandboxOption {
  // use cubebox store data
  // warning: this private field only used by cubecli
  bool  private_with_cubebox_store = 1;
}

message ExecCubeSandboxRequest {
  // requestID reqID
  string requestID = 1;
  // 容器所在的sandbox的id
  string sandbox_id = 2;
  // 要执行的容器ID。
  string container_id = 3;
  // 是否为交互式终端模式。
  bool terminal = 7;
  // Args specifies the binary and arguments for the application to execute.
	repeated string args = 9;
  // Env populates the process environment for the process.
	repeated string env = 10;
  // Cwd is the current working directory for the process and must be
	// relative to the container's root.
	string cwd = 11;
}

message ExecCubeSandboxResponse {
  // requestID reqID
  string requestID     = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret   = 2;
}

// AppSnapshotRequest is the request for creating an app snapshot.
// This request creates a cubebox, makes an app snapshot using cube-runtime,
// and then destroys the cubebox.
message AppSnapshotRequest {
  // The RunCubeSandboxRequest to create the cubebox.
  // Required annotations:
  //   - cube.master.appsnapshot.create: "true"
  //   - cube.master.appsnapshot.template.id: "<template_id>"
  RunCubeSandboxRequest create_request = 1;

  // Custom snapshot directory path. If empty, uses default path.
  string snapshot_dir = 2;
}

// AppSnapshotResponse is the response for app snapshot creation.
message AppSnapshotResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // The sandbox ID that was created and destroyed.
  string sandboxID = 3;
  // The template ID from the request annotations.
  string templateID = 4;
  // The snapshot path where the snapshot was created.
  string snapshotPath = 5;
  // Authoritative cubecow rootfs object name.
  string rootfs_vol = 6;
  // Authoritative cubecow memory object name.
  string memory_vol = 7;
  // Authoritative cubecow rootfs object kind.
  string rootfs_kind = 8;
  // Authoritative cubecow memory object kind.
  string memory_kind = 9;
  // Rootfs size at snapshot time, used by repair and validation.
  uint64 rootfs_size_bytes = 10;
}

message CommitSandboxRequest {
  // requestID reqID
  string requestID = 1;
  // ID of the running sandbox to snapshot.
  string sandboxID = 2;
  // Logical template ID.
  string templateID = 3;
  // Custom snapshot directory path. If empty, uses default path.
  string snapshot_dir = 4;
}

message CommitSandboxResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // ID of the sandbox that was snapshotted.
  string sandboxID = 3;
  // The logical template ID.
  string templateID = 4;
  // The snapshot path where the snapshot was created.
  string snapshotPath = 5;
  // Authoritative cubecow rootfs object name.
  string rootfs_vol = 6;
  // Authoritative cubecow memory object name.
  string memory_vol = 7;
  // Authoritative cubecow rootfs object kind.
  string rootfs_kind = 8;
  // Authoritative cubecow memory object kind.
  string memory_kind = 9;
  // Diagnostic-only rootfs device path; re-resolve from rootfs_vol on use.
  string rootfs_dev = 10;
  // Diagnostic-only memory device path; re-resolve from memory_vol on use.
  string memory_dev = 11;
  // Rootfs size at snapshot time, used by rollback resize planning.
  uint64 rootfs_size_bytes = 12;
}

message RollbackSandboxRequest {
  // requestID reqID
  string requestID = 1;
  // ID of the running sandbox to rollback.
  string sandboxID = 2;
  // Logical snapshot ID. When rootfs_vol/memory_vol/meta_dir are empty, cubelet
  // resolves them from its local snapshot catalog keyed by this id.
  string snapshotID = 3;
  // Optional cubecow rootfs object name for the snapshot. Empty means "resolve
  // from local catalog using snapshotID".
  string rootfs_vol = 4;
  // Optional cubecow memory object name for the snapshot. Empty means "resolve
  // from local catalog using snapshotID".
  string memory_vol = 5;
  // Optional snapshot metadata directory. Empty means "resolve from local
  // catalog using snapshotID".
  string meta_dir = 6;
  // New sandbox rootfs generation to derive.
  uint32 new_gen = 7;
  // Minimum rootfs size after deriving the new generation.
  uint64 desired_size = 8;
}

message RollbackSandboxResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // ID of the sandbox that was rolled back.
  string sandboxID = 3;
  // Logical snapshot ID.
  string snapshotID = 4;
  // New sandbox rootfs volume name.
  string rootfs_vol = 5;
  // New sandbox rootfs kind.
  string rootfs_kind = 6;
  // Diagnostic-only rootfs device path; re-resolve from rootfs_vol on use.
  string rootfs_dev = 7;
  // New sandbox rootfs generation.
  uint32 new_gen = 8;
  // Old sandbox rootfs volume name, if known.
  string old_rootfs_vol = 9;
  // Whether deleting old_rootfs_vol succeeded.
  bool old_rootfs_deleted = 10;
  // Snapshot memory volume cubelet resolved during rollback. Master records it
  // on the runtime ref so cleanup paths can detach the memory binding without
  // re-fetching the local catalog.
  string memory_vol = 11;
}

message CowObjectRef {
  // Authoritative cubecow object name.
  string name = 1;
  // cubecow object kind: "snapshot" or "volume".
  string kind = 2;
  // Logical role: "rootfs", "memory", "build_rootfs", etc.
  string role = 3;
}

message CleanupTemplateRequest {
  // requestID reqID
  string requestID = 1;
  // Logical template ID.
  string templateID = 2;
  // Snapshot path recorded on this node, if any. DEPRECATED in v4: cubelet
  // resolves this from local catalog; legacy masters may still send it for
  // backward compatibility but new masters MUST send empty.
  string snapshotPath = 3;
  // cubecow objects that should be removed on this node. DEPRECATED in v4:
  // cubelet derives objects from local catalog; legacy masters may still
  // populate this for backward compatibility but new masters MUST send empty.
  repeated CowObjectRef objects = 4;
}

message CleanupTemplateResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Logical template ID.
  string templateID = 3;
}

message ListSandboxSnapshotsRequest {
  // requestID reqID
  string requestID = 1;
  // Logical sandbox ID for logging / correlation.
  string sandboxID = 2;
  // cubecow objects that should be inspected on this node.
  repeated CowObjectRef objects = 3;
  // Snapshot metadata directory that must remain restorable.
  string meta_dir = 4;
}

message CowObjectStatus {
  // Authoritative cubecow object name.
  string name = 1;
  // cubecow object kind: "snapshot" or "volume".
  string kind = 2;
  // Logical role.
  string role = 3;
  // Whether the object currently exists on this node.
  bool exists = 4;
  // Current device path if resolvable.
  string device_path = 5;
  // Current size in bytes if resolvable.
  uint64 size_bytes = 6;
  // Object-specific inspection error if any.
  string error_message = 7;
}

message ListSandboxSnapshotsResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Logical sandbox ID.
  string sandboxID = 3;
  // Inspection results for requested cubecow objects.
  repeated CowObjectStatus objects = 4;
  // Whether the snapshot metadata directory exists.
  bool meta_dir_exists = 5;
  // Canonical snapshot state directory used for restore.
  string snapshot_state_path = 6;
  // Whether the snapshot state directory exists.
  bool snapshot_state_exists = 7;
  // Path inspection error if any.
  string path_error_message = 8;
}

message ListLocalSnapshotsRequest {
  // requestID reqID
  string requestID = 1;
}

message LocalSnapshotInfo {
  // Logical snapshot ID.
  string snapshotID = 1;
  // Instance type (e.g. "cubebox").
  string instance_type = 2;
  // Spec directory used to scope the snapshot (e.g. "2C2000M").
  string spec_dir = 3;
  // Absolute on-disk snapshot path.
  string snapshot_path = 4;
  // Snapshot metadata directory used for restore.
  string meta_dir = 5;
  // Authoritative cubecow rootfs object name.
  string rootfs_vol = 6;
  // Authoritative cubecow rootfs object kind.
  string rootfs_kind = 7;
  // Authoritative cubecow memory object name.
  string memory_vol = 8;
  // Authoritative cubecow memory object kind.
  string memory_kind = 9;
  // Rootfs size in bytes at snapshot time.
  uint64 rootfs_size_bytes = 10;
  // RFC3339 timestamp captured at commit time.
  string created_at = 11;
  // Build rootfs object name (template-build path only). Used to clean up
  // the temporary writable layer during CleanupTemplate.
  string build_rootfs_vol = 12;
  // Build rootfs object kind.
  string build_rootfs_kind = 13;
  // Catalog entry kind: "template" (AppSnapshot) or "runtime_snapshot"
  // (CommitSandbox). Empty for pre-v4 legacy entries.
  string kind = 14;
}

message ListLocalSnapshotsResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Snapshots known locally to this cubelet.
  repeated LocalSnapshotInfo snapshots = 3;
}

message GetLocalSnapshotRequest {
  // requestID reqID
  string requestID = 1;
  // Logical snapshot ID to look up.
  string snapshotID = 2;
}

message GetLocalSnapshotResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Catalog entry. Nil/empty when not found.
  LocalSnapshotInfo snapshot = 3;
}

message ExportTemplateRootfsArtifactRequest {
  // requestID reqID
  string requestID = 1;
  // Logical template ID to export.
  string templateID = 2;
  // Fallback rootfs volume name when the local catalog is missing/incomplete.
  string rootfsVol = 3;
  // Fallback rootfs kind when the local catalog is missing/incomplete.
  string rootfsKind = 4;
  // Expected rootfs size in bytes.
  uint64 rootfsSizeBytes = 5;
}

message ExportTemplateRootfsArtifactChunk {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Logical template ID being exported.
  string templateID = 3;
  // Rootfs size in bytes.
  uint64 rootfsSizeBytes = 4;
  // Raw ext4 bytes.
  bytes content = 5;
}

message GetStorageMetricsRequest {
  // requestID reqID
  string requestID = 1;
}

message GetStorageMetricsResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Node identifier that produced this metric snapshot.
  string node_id = 3;
  // Timestamp when metrics were collected.
  int64 timestamp_unix_nano = 4;
  // Storage metrics reported by cubecow.
  map<string, uint64> metrics = 5;
}

// StorageVolumeInfo describes a single backend file/volume entry attached to a
// sandbox, as understood by cubelet at the time of inspection.
message StorageVolumeInfo {
  // Logical mount name within the sandbox spec.
  string name = 1;
  // Filesystem path to mount inside the sandbox. For cubecow volumes this is
  // re-resolved through the engine on every call.
  string file_path = 2;
  // Size limit in bytes (0 if not pre-allocated).
  uint64 size_limit = 3;
  // cubecow object name backing this volume. Empty for legacy file-only
  // entries that bypass cubecow.
  string volume_name = 4;
  // cubecow object kind ("volume"/"snapshot"). Empty for non-cubecow entries.
  string kind = 5;
  // Generation number, used by rollback to derive successor objects.
  uint32 gen = 6;
}

// SandboxStorageInfo aggregates every backend volume cubelet has registered
// for a single sandbox.
message SandboxStorageInfo {
  string namespace = 1;
  string sandboxID = 2;
  repeated StorageVolumeInfo volumes = 3;
}

message InspectStorageVolumesRequest {
  // requestID reqID
  string requestID = 1;
  // Optional bucket name; defaults to "emptydir/v1" when empty.
  string bucket = 2;
}

message InspectStorageVolumesResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Sandbox storage records, after device-path refresh.
  repeated SandboxStorageInfo sandboxes = 3;
}

message CleanupOrphanStorageFilesRequest {
  // requestID reqID
  string requestID = 1;
  // Optional bucket name; defaults to "emptydir/v1" when empty.
  string bucket = 2;
  // Format roots cubelet should scan, e.g. "512Mi" / "1Gi" / "others". When
  // empty cubelet falls back to a built-in default list.
  repeated string formats = 3;
  // When true cubelet only reports orphans without removing them.
  bool dry_run = 4;
}

message StorageOrphanEntry {
  // Format root the file lives under (e.g. "512Mi").
  string format = 1;
  // Absolute path to the orphan file.
  string file_path = 2;
  // True when the file was successfully removed by this RPC. Always false for
  // dry-run responses.
  bool removed = 3;
  // Removal error if any (only set when removed=false and dry_run=false).
  string error_message = 4;
}

message CleanupOrphanStorageFilesResponse {
  // requestID reqID
  string requestID = 1;
  // Ret.
  cubelet.services.errorcode.v1.Ret ret = 2;
  // Orphan files cubelet found (and possibly removed).
  repeated StorageOrphanEntry orphans = 3;
}
