name: Manual Build CubeAPI Artifact

run-name: Build cube-api from ${{ inputs.target_ref }}

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch, tag, or commit SHA to build"
        required: true
        default: "main"

permissions:
  contents: read
  packages: read

env:
  BUILDER_IMAGE_REMOTE: ghcr.io/tencentcloud/cubesandbox-builder:ubuntu2004
  BUILDER_IMAGE_LOCAL: cube-sandbox-builder:ci

jobs:
  build:
    name: Build CubeAPI Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target revision
        id: target
        shell: bash
        run: |
          set -euo pipefail

          full_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=12 HEAD)"

          safe_ref="$(printf '%s' '${{ inputs.target_ref }}' \
            | sed 's#[/: ]#-#g' \
            | tr -cd 'A-Za-z0-9._-')"

          echo "full_sha=${full_sha}" >> "${GITHUB_OUTPUT}"
          echo "short_sha=${short_sha}" >> "${GITHUB_OUTPUT}"
          echo "safe_ref=${safe_ref}" >> "${GITHUB_OUTPUT}"

          {
            echo "## CubeAPI build target"
            echo ""
            echo "- Ref: \`${{ inputs.target_ref }}\`"
            echo "- Commit: \`${full_sha}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Log in to GitHub Container Registry
        id: ghcr_login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Warn about GHCR login failure
        if: steps.ghcr_login.outcome == 'failure'
        shell: bash
        run: echo "::warning::GHCR login failed - will attempt pull as anonymous or build locally"

      - name: Resolve builder image
        id: builder_image
        shell: bash
        run: |
          set -euo pipefail

          build_local_builder_image() {
            docker build \
              -t "${BUILDER_IMAGE_LOCAL}" \
              -f docker/Dockerfile.builder \
              --build-arg GITHUB_ACTIONS=true \
              --build-arg RUSTUP_DIST_SERVER=https://static.rust-lang.org \
              --build-arg RUSTUP_UPDATE_ROOT=https://static.rust-lang.org/rustup \
              .
          }

          image="${BUILDER_IMAGE_REMOTE}"

          if docker pull "${BUILDER_IMAGE_REMOTE}"; then
            echo "Using published builder image ${BUILDER_IMAGE_REMOTE}"
          else
            echo "Failed to pull ${BUILDER_IMAGE_REMOTE}, building local fallback image..."
            build_local_builder_image
            image="${BUILDER_IMAGE_LOCAL}"
          fi

          echo "image=${image}" >> "${GITHUB_OUTPUT}"

          {
            echo ""
            echo "## Builder image"
            echo ""
            echo "- Image: \`${image}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Build CubeAPI
        shell: bash
        run: |
          set -euo pipefail

          make cubeapi \
            BUILDER_IMAGE="${{ steps.builder_image.outputs.image }}"

          test -x _output/bin/cube-api

          {
            echo ""
            echo "## Build output"
            echo ""
            echo "- \`_output/bin/cube-api\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload CubeAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubeapi-binary-${{ steps.target.outputs.safe_ref }}-${{ steps.target.outputs.short_sha }}
          path: _output/bin/cube-api
          if-no-files-found: error
